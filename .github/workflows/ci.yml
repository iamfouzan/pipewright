name: CI
on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - '**.md'
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python: ['3.11', '3.12', '3.13']
    steps:
      # NOTE: pin these to a commit SHA before publishing — pipewright will flag
      # them otherwise (yes, we eat our own dog food).
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
